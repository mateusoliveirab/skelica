name: Deploy Skelica

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=skelica

  smoke:
    name: Post-deploy Smoke
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install agent-browser
        run: npm install -g agent-browser@0.27.0

      - name: Wait for propagation
        run: |
          echo "Polling skelica.pages.dev for new deploy..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://skelica.pages.dev || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Ready after ${i}x2s"
              break
            fi
            sleep 2
          done

      - name: Run smoke
        env:
          E2E_SCREENSHOT_DIR: ${{ github.workspace }}/smoke-screenshots
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/e2e.sh https://skelica.pages.dev

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: smoke-screenshots/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Skelica Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://skelica.pages.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
