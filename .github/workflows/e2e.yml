name: E2E

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/e2e.sh'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL (defaults to vite preview)'
        required: false
        default: ''

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Install agent-browser
        run: npm install -g agent-browser@0.27.0

      - name: Start vite preview
        run: npm run preview -- --port 4173 &
        working-directory: frontend

      - name: Run E2E
        env:
          E2E_SCREENSHOT_DIR: ${{ github.workspace }}/e2e-screenshots
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/e2e.sh "${{ inputs.url || 'http://localhost:4173' }}"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e-screenshots/
          retention-days: 7
