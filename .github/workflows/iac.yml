name: Skelica IaC

on:
  push:
    branches: [main]
    paths:
      - 'iac/**'
      - '.github/workflows/iac.yml'
  pull_request:
    paths:
      - 'iac/**'
      - '.github/workflows/iac.yml'
  workflow_dispatch:

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Plan
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Plan Summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs')
            let plan = fs.readFileSync('iac/plan_output.txt', 'utf8')
            if (plan.length > 60000) plan = plan.slice(-60000)
            await core.summary
              .addHeading('Skelica IaC — Terraform Plan')
              .addCodeBlock(plan, 'terraform')
              .write()

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply Summary
        if: always()
        run: |
          echo "## Skelica IaC Apply" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Event:** ${{ github.event_name }} | **URL:** https://skelica.pages.dev |" >> $GITHUB_STEP_SUMMARY
